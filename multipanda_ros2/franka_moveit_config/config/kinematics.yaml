panda_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
# Manipulator groups (tip = *_hand_tcp). Required so MoveIt/Pilz can solve IK to the TCP;
# without these, pose goals fail with "No IK solver available for link panda_hand_tcp".
